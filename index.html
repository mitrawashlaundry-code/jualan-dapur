    if(!form.namaProduk.trim()||!form.hasilPcs){showToast("Nama & hasil pcs wajib","error");return;}
    const r={id:editData?.id||uid(),namaProduk:form.namaProduk,emoji:form.emoji||"🍱",hasilPcs:+form.hasilPcs,beratPcs:+form.beratPcs||0,biayaTenaga:+form.biayaTenaga||0,biayaLain:+form.biayaLain||0,bahan:form.bahan};
    if(editData)setResep(prev=>prev.map(x=>x.id===editData.id?r:x));
    else setResep(prev=>[...prev,r]);
    showToast(editData?"Resep diperbarui ✅":"Resep baru ditambah ✅");setModalForm(false);
  };
  const hapus=(r)=>setKonfirm({judul:"Hapus Resep?",pesan:`Hapus resep "${r.namaProduk}"?`,onYa:()=>{setResep(prev=>prev.filter(x=>x.id!==r.id));showToast("Resep dihapus");}});
  const tambahBahan=()=>{
    if(!newBahan.bid||!newBahan.qty)return;
    const b=bahanBaku.find(x=>x.id===newBahan.bid);
    setForm(f=>({...f,bahan:[...f.bahan,{bid:newBahan.bid,qty:+newBahan.qty,satuan:b?.satuan||""}]}));
    setNewBahan({bid:"",qty:""});
  };
  const hapusBahan=(i)=>setForm(f=>({...f,bahan:f.bahan.filter((_,idx)=>idx!==i)}));
  const biayaEst=form.bahan.length>0?hitungEst(form.bahan,bahanBaku):0;
  const hppEst=+form.hasilPcs>0?(biayaEst+(+form.biayaTenaga||0)+(+form.biayaLain||0))/(+form.hasilPcs):0;

  return<div className="page-pad">
    <div className="row-between" style={{marginBottom:16}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:22}}>📋 Resep</div>
      <button className="btn-prime" onClick={()=>bukaForm()}>+ Resep</button>
    </div>
    {resep.map(r=>{
      const est=hitungEst(r.bahan,bahanBaku);
      const hpp=r.hasilPcs>0?(est+r.biayaTenaga+r.biayaLain)/r.hasilPcs:0;
      return<div key={r.id} className="resep-card" style={{marginBottom:10}}>
        <div className="row-between" style={{marginBottom:8}}>
          <div className="row"><span style={{fontSize:22}}>{r.emoji}</span>
            <div><div style={{fontWeight:800,fontSize:15}}>{r.namaProduk}</div>
              <div style={{fontSize:12,color:"var(--muted)"}}>{r.hasilPcs} pcs/batch · {r.beratPcs}gr · {r.bahan.length} bahan</div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{color:"var(--orange)",fontWeight:700,fontSize:14}}>{fmt(est)}</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>HPP ~{fmt(hpp)}/pcs</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn-out" onClick={()=>setDetail(r)} style={{flex:1}}>👁 Lihat Detail</button>
          <button className="btn-out" onClick={()=>bukaForm(r)} style={{flex:1}}>✏️ Edit</button>
          <button className="btn-red" onClick={()=>hapus(r)}>🗑</button>
        </div>
      </div>;
    })}

    {detail&&<Modal title={`${detail.emoji} ${detail.namaProduk}`} onClose={()=>setDetail(null)}>
      <div style={{marginBottom:12}}>
        <span className="tag" style={{background:"rgba(46,125,50,.1)",color:"var(--green)",marginRight:6}}>{detail.hasilPcs} pcs/batch</span>
        <span className="tag" style={{background:"rgba(230,81,0,.1)",color:"var(--orange)"}}>{detail.beratPcs}gr/kemasan</span>
      </div>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>🧂 Komposisi Bahan</div>
      {detail.bahan.map((item,i)=>{const b=bahanBaku.find(x=>x.id===item.bid);return<div key={i} className="bahan-row">
        <span>{b?.emoji} {b?.nama||item.bid}</span>
        <span style={{fontWeight:600}}>{item.qty} {item.satuan} · {fmt((b?.hargaBeli||0)*item.qty)}</span>
      </div>;})}
      <div style={{marginTop:10,padding:"10px 0",borderTop:"2px solid var(--border)"}}>
        <div className="summary-row"><span>Total bahan</span><span style={{color:"var(--orange)",fontWeight:700}}>{fmt(hitungEst(detail.bahan,bahanBaku))}</span></div>
        <div className="summary-row"><span>Tenaga + lain</span><span>{fmt(detail.biayaTenaga+detail.biayaLain)}</span></div>
        <div className="summary-row"><span style={{fontWeight:800}}>HPP estimasi</span><span style={{fontWeight:800,color:"var(--orange)"}}>{fmt(detail.hasilPcs>0?(hitungEst(detail.bahan,bahanBaku)+detail.biayaTenaga+detail.biayaLain)/detail.hasilPcs:0)}/pcs</span></div>
      </div>
    </Modal>}

    {modalForm&&<Modal title={editData?"Edit Resep":"Tambah Resep Baru"} onClose={()=>setModalForm(false)}>
      <div className="grid2">
        <div className="frow"><label className="lbl">Nama Produk *</label>
          <input className="inp" value={form.namaProduk} onChange={e=>setForm(f=>({...f,namaProduk:e.target.value}))} placeholder="Rendang Sapi 150gr"/>
        </div>
        <div className="frow"><label className="lbl">Emoji</label>
          <input className="inp" value={form.emoji} onChange={e=>setForm(f=>({...f,emoji:e.target.value}))}/>
        </div>
      </div>
      <div className="grid2">
        <div className="frow"><label className="lbl">Hasil Pcs *</label>
          <input className="inp" type="number" value={form.hasilPcs} onChange={e=>setForm(f=>({...f,hasilPcs:e.target.value}))} placeholder="30"/>
        </div>
        <div className="frow"><label className="lbl">Berat/Kemasan (gr)</label>
          <input className="inp" type="number" value={form.beratPcs} onChange={e=>setForm(f=>({...f,beratPcs:e.target.value}))} placeholder="150"/>
        </div>
      </div>
      <div className="grid2">
        <div className="frow"><label className="lbl">Biaya Tenaga (Rp)</label>
          <input className="inp" type="number" value={form.biayaTenaga} onChange={e=>setForm(f=>({...f,biayaTenaga:e.target.value}))} placeholder="50000"/>
        </div>
        <div className="frow"><label className="lbl">Biaya Lain (Rp)</label>
          <input className="inp" type="number" value={form.biayaLain} onChange={e=>setForm(f=>({...f,biayaLain:e.target.value}))} placeholder="15000"/>
        </div>
      </div>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>🧂 Bahan-bahan</div>
      {form.bahan.map((item,i)=>{const b=bahanBaku.find(x=>x.id===item.bid);return<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{flex:1,fontSize:13}}>{b?.emoji} {b?.nama} × {item.qty} {item.satuan}</span>
        <button className="btn-red" onClick={()=>hapusBahan(i)} style={{minHeight:32,padding:"4px 8px",fontSize:12}}>✕</button>
      </div>;})}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <select className="sel" style={{flex:2}} value={newBahan.bid} onChange={e=>setNewBahan(n=>({...n,bid:e.target.value}))}>
          <option value="">Pilih bahan</option>
          {bahanBaku.map(b=><option key={b.id} value={b.id}>{b.emoji} {b.nama}</option>)}
        </select>
        <input className="inp" style={{flex:1}} type="number" value={newBahan.qty} onChange={e=>setNewBahan(n=>({...n,qty:e.target.value}))} placeholder="Qty"/>
        <button className="btn-green" onClick={tambahBahan}>+</button>
      </div>
      {form.bahan.length>0&&<div className="hpp-preview" style={{marginBottom:14}}>
        <div className="summary-row"><span>Est. biaya bahan</span><span style={{color:"var(--orange)",fontWeight:700}}>{fmt(biayaEst)}</span></div>
        <div className="summary-row"><span>HPP estimasi</span><span style={{color:"var(--orange)",fontWeight:700}}>{fmt(hppEst)}/pcs</span></div>
      </div>}
      <button className="btn-prime" onClick={simpan} style={{width:"100%"}}>💾 Simpan Resep</button>
    </Modal>}
  </div>;
}

/* ══════════════════════════════════════════════════════
   HALAMAN 7 — RESELLER
══════════════════════════════════════════════════════ */
function ResellerPage({reseller,setReseller,penjualan,showToast,setKonfirm}){
  const[modal,setModal]=useState(false);
  const[editData,setEditData]=useState(null);
  const[detail,setDetail]=useState(null);
  const[form,setForm]=useState({nama:"",hp:"",tipe:"Reseller",kota:"",diskon:0});
  const[errors,setErrors]=useState({});

  const bukaForm=(r=null)=>{setEditData(r);setForm(r?{nama:r.nama,hp:r.hp,tipe:r.tipe,kota:r.kota,diskon:r.diskon}:{nama:"",hp:"",tipe:"Reseller",kota:"",diskon:0});setErrors({});setModal(true);};
  const validasiWA=(hp)=>{const n=hp.replace(/\D/g,"");return(n.startsWith("08")||n.startsWith("62"))&&n.length>=10;};
  const simpan=()=>{
    const e={};
    if(!form.nama.trim())e.nama="Nama wajib";
    if(!validasiWA(form.hp))e.hp="No. WA tidak valid (08/62, min 10 digit)";
    setErrors(e);if(Object.keys(e).length)return;
    const r={id:editData?.id||uid(),nama:form.nama,hp:form.hp,tipe:form.tipe,kota:form.kota,diskon:+form.diskon||0};
    if(editData)setReseller(prev=>prev.map(x=>x.id===editData.id?r:x));
    else setReseller(prev=>[...prev,r]);
    showToast(editData?"Reseller diperbarui ✅":"Reseller baru ditambah ✅");setModal(false);
  };
  const hapus=(r)=>setKonfirm({judul:"Hapus Reseller?",pesan:`Hapus "${r.nama}"?`,onYa:()=>{setReseller(prev=>prev.filter(x=>x.id!==r.id));showToast("Reseller dihapus");}});

  const TIPE_COLOR={Reseller:"var(--red)",Retail:"var(--orange)",Ecer:"var(--gold)"};

  return<div className="page-pad">
    <div className="row-between" style={{marginBottom:16}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:22}}>👥 Reseller</div>
      <button className="btn-prime" onClick={()=>bukaForm()}>+ Reseller</button>
    </div>
    {reseller.map(r=>{
      const riwayat=penjualan.filter(t=>t.resellerId===r.id);
      const totalBelanja=riwayat.reduce((s,t)=>s+t.total,0);
      return<div key={r.id} className="prod-card" style={{marginBottom:10}}>
        <div className="row-between" style={{marginBottom:8}}>
          <div className="row">
            <div style={{width:40,height:40,borderRadius:20,background:"rgba(200,32,26,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
            <div><div style={{fontWeight:800,fontSize:14}}>{r.nama}</div>
              <div style={{fontSize:12,color:"var(--muted)"}}>{r.kota} · {r.hp}</div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <span className="badge" style={{background:`rgba(200,32,26,.08)`,color:TIPE_COLOR[r.tipe]||"var(--muted)"}}>{r.tipe}</span>
            {r.diskon>0&&<div style={{fontSize:12,color:"var(--gold)",fontWeight:700,marginTop:2}}>Disc {r.diskon}%</div>}
          </div>
        </div>
        <div style={{fontSize:13,color:"var(--muted)",marginBottom:10}}>
          {riwayat.length} transaksi · Total belanja: <b style={{color:"var(--red)"}}>{fmt(totalBelanja)}</b>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="wa-btn" onClick={()=>{if(!r.hp||!r.hp.trim()){showToast("Nomor WA reseller belum diisi","error");return;}window.open(`https://wa.me/${r.hp.replace(/^0/,'62').replace(/^\+/,'')}`);}}>📱 WA</button>
          <button className="btn-out" onClick={()=>setDetail(r)} style={{flex:1}}>Riwayat</button>
          <button className="btn-out" onClick={()=>bukaForm(r)} style={{flex:1}}>✏️ Edit</button>
          <button className="btn-red" onClick={()=>hapus(r)}>🗑</button>
        </div>
      </div>;
    })}
    {reseller.length===0&&<div className="empty-state"><div className="icon">👥</div><div>Belum ada reseller. Tambah reseller untuk kemudahan kasir.</div></div>}

    {detail&&<Modal title={`Riwayat — ${detail.nama}`} onClose={()=>setDetail(null)}>
      {penjualan.filter(t=>t.resellerId===detail.id).map(t=><div key={t.id} className="trx-item" style={{marginBottom:6}}>
        <div className="row-between">
          <div><div style={{fontSize:13,fontWeight:700}}>{fmtTgl(t.tgl)}</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{(t.items||[]).map(i=>`${i.nama} ×${i.qty}`).join(", ")}</div>
          </div>
          <span style={{color:"var(--red)",fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}}>{fmt(t.total)}</span>
        </div>
      </div>)}
      {penjualan.filter(t=>t.resellerId===detail.id).length===0&&<div className="empty-state" style={{padding:20}}>Belum ada transaksi</div>}
    </Modal>}

    {modal&&<Modal title={editData?"Edit Reseller":"Tambah Reseller"} onClose={()=>setModal(false)}>
      <div className="frow"><label className="lbl">Nama *</label>
        <input className={`inp${errors.nama?" error":""}`} value={form.nama} onChange={e=>setForm(f=>({...f,nama:e.target.value}))} placeholder="Bu Rina — Warung Pak RT"/>
        {errors.nama&&<div style={{fontSize:12,color:"#F87171"}}>⚠️ {errors.nama}</div>}
      </div>
      <div className="frow"><label className="lbl">No. WA *</label>
        <input className={`inp${errors.hp?" error":""}`} value={form.hp} onChange={e=>setForm(f=>({...f,hp:e.target.value}))} placeholder="08xxxxxxxxxx"/>
        {errors.hp&&<div style={{fontSize:12,color:"#F87171"}}>⚠️ {errors.hp}</div>}
      </div>
      <div className="grid2">
        <div className="frow"><label className="lbl">Tipe</label>
          <select className="sel" value={form.tipe} onChange={e=>setForm(f=>({...f,tipe:e.target.value}))}>
            {["Reseller","Retail","Ecer"].map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="frow"><label className="lbl">Kota</label>
          <input className="inp" value={form.kota} onChange={e=>setForm(f=>({...f,kota:e.target.value}))} placeholder="Depok"/>
        </div>
      </div>
      <div className="frow"><label className="lbl">Diskon Default (%)</label>
        <input className="inp" type="number" min="0" max="100" value={form.diskon} onChange={e=>setForm(f=>({...f,diskon:e.target.value}))} placeholder="10"/>
      </div>
      <button className="btn-prime" onClick={simpan} style={{width:"100%"}}>💾 Simpan</button>
    </Modal>}
  </div>;
}

/* ── PENGELUARAN FORM FIELDS ────────────────────────── */
const PENGELUARAN_KAT=["Pengiriman","Kemasan & Label","Pemasaran","Operasional","Lain-lain"];
function PengeluaranFormFields({f,setF,errs}){
  return<>
    <div className="frow"><label className="lbl">Tanggal</label>
      <input className="inp" type="date" value={f.tgl} onChange={e=>setF(x=>({...x,tgl:e.target.value}))}/>
    </div>
    <div className="frow"><label className="lbl">Kategori</label>
      <select className="sel" value={f.kat} onChange={e=>setF(x=>({...x,kat:e.target.value}))}>
        {PENGELUARAN_KAT.map(k=><option key={k}>{k}</option>)}
      </select>
    </div>
    <div className="frow"><label className="lbl">Keterangan *</label>
      <input className={`inp${errs.desc?" error":""}`} value={f.desc} onChange={e=>setF(x=>({...x,desc:e.target.value}))} placeholder="Ongkir ke reseller Bu Rina"/>
      {errs.desc&&<div style={{fontSize:12,color:"#F87171"}}>⚠️ {errs.desc}</div>}
    </div>
    <div className="frow"><label className="lbl">Jumlah (Rp) *</label>
      <input className={`inp${errs.jml?" error":""}`} type="number" value={f.jml} onChange={e=>setF(x=>({...x,jml:e.target.value}))} placeholder="25000"/>
      {errs.jml&&<div style={{fontSize:12,color:"#F87171"}}>⚠️ {errs.jml}</div>}
    </div>
  </>;
}

/* ══════════════════════════════════════════════════════
   HALAMAN 8 — PENGELUARAN
══════════════════════════════════════════════════════ */
function Pengeluaran({pengeluaran,setPengeluaran,showToast,setKonfirm}){
  const[modal,setModal]=useState(false);
  const[modalEdit,setModalEdit]=useState(null);
  const[form,setForm]=useState({tgl:todayStr,kat:"Operasional",desc:"",jml:""});
  const[formEdit,setFormEdit]=useState({});
  const[errors,setErrors]=useState({});
  const KAT=PENGELUARAN_KAT;
  const KAT_COLOR={"Pengiriman":"var(--red)","Kemasan & Label":"var(--orange)","Pemasaran":"var(--gold)","Operasional":"var(--green)","Lain-lain":"var(--muted)"};
  const KAT_EMOJI={"Pengiriman":"🚚","Kemasan & Label":"📦","Pemasaran":"📣","Operasional":"⚙️","Lain-lain":"📝"};

  const simpan=()=>{
    const e={};
    if(!form.desc.trim())e.desc="Keterangan wajib";
    if(!form.jml||+form.jml<=0)e.jml="Jumlah wajib";
    setErrors(e);if(Object.keys(e).length)return;
    setPengeluaran(prev=>[{id:uid(),tgl:form.tgl,kat:form.kat,desc:form.desc,jml:+form.jml},...prev]);
    showToast("Pengeluaran dicatat ✅");setModal(false);setForm({tgl:todayStr,kat:"Operasional",desc:"",jml:""});
    setErrors({});
  };

  const bukaEdit=(p)=>{setModalEdit(p);setFormEdit({tgl:p.tgl,kat:p.kat,desc:p.desc,jml:p.jml});setErrors({});};
  const simpanEdit=()=>{
    const e={};
    if(!formEdit.desc?.trim())e.desc="Keterangan wajib";
    if(!formEdit.jml||+formEdit.jml<=0)e.jml="Jumlah wajib";
    setErrors(e);if(Object.keys(e).length)return;
    setPengeluaran(prev=>prev.map(p=>p.id===modalEdit.id?{...p,...formEdit,jml:+formEdit.jml}:p));
    showToast("Pengeluaran diperbarui ✅");setModalEdit(null);
  };

  const hapus=(p)=>setKonfirm({judul:"Hapus Pengeluaran?",pesan:`Hapus "${p.desc}"?`,onYa:()=>{setPengeluaran(prev=>prev.filter(x=>x.id!==p.id));showToast("Pengeluaran dihapus");}});

  const summary=KAT.map(k=>({kat:k,total:pengeluaran.filter(p=>p.kat===k).reduce((s,p)=>s+p.jml,0)})).filter(x=>x.total>0);
  const totalAll=pengeluaran.reduce((s,p)=>s+p.jml,0);

  return<div className="page-pad">
    <div className="row-between" style={{marginBottom:14}}>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:20}}>💸 Pengeluaran</div>
      <button className="btn-prime" style={{fontSize:13,padding:"9px 14px"}} onClick={()=>{setForm({tgl:todayStr,kat:"Operasional",desc:"",jml:""});setErrors({});setModal(true);}}>+ Catat</button>
    </div>

    {summary.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:"var(--text2)"}}>Ringkasan Kategori</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8,marginBottom:8}}>
        {summary.map(s=><div key={s.kat} className="stat-card">
          <div style={{fontSize:11,fontWeight:700,color:KAT_COLOR[s.kat]||"var(--muted)"}}>{KAT_EMOJI[s.kat]} {s.kat}</div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:15,color:"var(--text)"}}>{fmtRb(s.total)}</div>
        </div>)}
      </div>
      <div style={{textAlign:"right",fontWeight:800,fontSize:14,color:"var(--red)"}}>Total: {fmt(totalAll)}</div>
    </div>}

    {pengeluaran.map(p=><div key={p.id} className="trx-item" style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span className="tag" style={{background:`rgba(200,32,26,.08)`,color:KAT_COLOR[p.kat]||"var(--muted)",flexShrink:0}}>{KAT_EMOJI[p.kat]} {p.kat}</span>
          </div>
          <div style={{fontWeight:700,fontSize:14,wordBreak:"break-word"}}>{p.desc}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{fmtTgl(p.tgl)}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
          <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,color:"var(--red)",fontSize:15}}>{fmt(p.jml)}</span>
          <div style={{display:"flex",gap:6}}>
            <button className="btn-out" style={{fontSize:11,padding:"4px 8px",minHeight:32}} onClick={()=>bukaEdit(p)}>✏️</button>
            <button className="btn-red" style={{fontSize:11,padding:"4px 8px",minHeight:32}} onClick={()=>hapus(p)}>🗑</button>
          </div>
        </div>
      </div>
    </div>)}
    {pengeluaran.length===0&&<div className="empty-state"><div className="icon">💸</div><div>Belum ada pengeluaran dicatat</div></div>}

    {/* Modal Tambah */}
    {modal&&<Modal title="Catat Pengeluaran" onClose={()=>setModal(false)}>
      <PengeluaranFormFields f={form} setF={setForm} errs={errors}/>
      <button className="btn-prime" onClick={simpan} style={{width:"100%"}}>💾 Simpan</button>
    </Modal>}

    {/* Modal Edit */}
    {modalEdit&&<Modal title={`✏️ Edit Pengeluaran`} onClose={()=>setModalEdit(null)}>
      <div style={{background:"rgba(200,32,26,.06)",border:"1px solid rgba(200,32,26,.15)",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
        <div style={{fontSize:12,color:"var(--muted)"}}>Catatan lama</div>
        <div style={{fontWeight:700,fontSize:14}}>{modalEdit.desc}</div>
        <div style={{fontSize:13,color:"var(--red)",fontWeight:700}}>{fmt(modalEdit.jml)}</div>
      </div>
      <PengeluaranFormFields f={formEdit} setF={setFormEdit} errs={errors}/>
      <button className="btn-prime" onClick={simpanEdit} style={{width:"100%"}}>💾 Simpan Perubahan</button>
    </Modal>}
  </div>;
}

/* ══════════════════════════════════════════════════════
   HALAMAN 9 — LAPORAN
══════════════════════════════════════════════════════ */
function Laporan({penjualan,batchProduksi,pengeluaran,produkJadi,resep}){
  const[periode,setPeriode]=useState("7");
  const[tglAwal,setTglAwal]=useState(dAgo(7));
  const[tglAkhir,setTglAkhir]=useState(todayStr);
  const[errCustom,setErrCustom]=useState("");

  const CHIPS=[{label:"Hari Ini",val:"0"},{label:"Kemarin",val:"1"},{label:"7 Hari",val:"7"},{label:"30 Hari",val:"30"},{label:"3 Bulan",val:"90"},{label:"Custom",val:"custom"}];

  const getRange=()=>{
    if(periode==="custom")return{dari:tglAwal,ke:tglAkhir};
    const d=+periode;
    return{dari:d===0?todayStr:d===1?dAgo(1):dAgo(d),ke:d===1?dAgo(1):todayStr};
  };
  const{dari,ke}=getRange();
  const inRange=(tgl)=>tgl>=dari&&tgl<=ke;

  // Validasi & handle custom date input
  const handleDariChange=(val)=>{
    if(val>tglAkhir){const oldAkhir=tglAkhir;setErrCustom("Tanggal 'Dari' tidak boleh setelah 'Sampai'. Otomatis ditukar.");setTglAwal(oldAkhir);setTglAkhir(val);}
    else{setTglAwal(val);setErrCustom("");}
  };
  const handleKeChange=(val)=>{
    if(tglAwal>val){const oldAwal=tglAwal;setErrCustom("Tanggal 'Sampai' tidak boleh sebelum 'Dari'. Otomatis ditukar.");setTglAkhir(oldAwal);setTglAwal(val);}
    else{setTglAkhir(val);setErrCustom("");}
  };

  const jual=penjualan.filter(t=>inRange(t.tgl));
  const batch=batchProduksi.filter(b=>inRange(b.tgl));
  const keluar=pengeluaran.filter(p=>inRange(p.tgl));

  const omzet=jual.reduce((s,t)=>s+t.total,0);
  const biayaProd=batch.reduce((s,b)=>s+b.totalBiaya,0);
  const biayaKeluar=keluar.reduce((s,p)=>s+p.jml,0);
  const labaBersih=omzet-biayaProd-biayaKeluar;

  // Top produk
  const prodMap={};
  jual.forEach(t=>(t.items||[]).forEach(i=>{if(!prodMap[i.pid])prodMap[i.pid]={nama:i.nama,emoji:i.emoji,qty:0,nilai:0};prodMap[i.pid].qty+=i.qty;prodMap[i.pid].nilai+=i.harga*i.qty;}));
  const topProd=Object.values(prodMap).sort((a,b)=>b.qty-a.qty).slice(0,5);

  // Bar chart — mengikuti filter periode aktif (max 30 hari, min 1)
  const chartRange=useMemo(()=>{
    const diffD=Math.min(30,Math.max(1,Math.ceil((new Date(ke+`T00:00:00`)-new Date(dari+`T00:00:00`))/86400000)+1));
    return Array.from({length:diffD},(_,i)=>{
      const d=dFrom(dari,i);
      const omzD=penjualan.filter(t=>t.tgl===d).reduce((s,t)=>s+t.total,0);
      const biayaD=batchProduksi.filter(b=>b.tgl===d).reduce((s,b)=>s+b.totalBiaya,0)+pengeluaran.filter(p=>p.tgl===d).reduce((s,p)=>s+p.jml,0);
      const label=new Date(d+`T00:00:00`).toLocaleDateString("id-ID",{day:"numeric",month:"numeric"});
      return{d,omzD,biayaD,label};
    });
  },[dari,ke,penjualan,batchProduksi,pengeluaran]);
  const maxVal=Math.max(...chartRange.map(c=>Math.max(c.omzD,c.biayaD)),1);

  // Export CSV
  const exportCSV=(type)=>{
    let rows,fname;
    if(type==="jual"){
      rows=[["ID","Tanggal","Pembeli","Produk","Qty","Harga","Total","Metode"]];
      jual.forEach(t=>(t.items||[]).forEach(i=>rows.push([t.id,t.tgl,t.pembeli,i.nama,i.qty,i.harga,t.total,t.metodeBayar])));
      fname="penjualan";
    }else{
      rows=[["ID","Tanggal","Produk","Batch","PcsJadi","TotalBiaya","HPP"]];
      batch.forEach(b=>{const r=resep.find(x=>x.id===b.resepId);rows.push([b.id,b.tgl,r?.namaProduk||b.resepId,b.jumlahBatch,b.pcsJadi,b.totalBiaya,b.hppPerPcs]);});
      fname="produksi";
    }
    const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`${fname}_${dari}_${ke}.csv`;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  return<div className="page-pad">
    <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:22,marginBottom:12}}>📊 Laporan & Analitik</div>

    {/* Filter Periode */}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      {CHIPS.map(c=><button key={c.val} className={`chip${periode===c.val?" active":""}`} onClick={()=>setPeriode(c.val)}>{c.label}</button>)}
    </div>
    {periode==="custom"&&<div className="grid2" style={{marginBottom:6}}>
      <div className="frow"><label className="lbl">Dari</label><input className="inp" type="date" value={tglAwal} onChange={e=>handleDariChange(e.target.value)}/></div>
      <div className="frow"><label className="lbl">Sampai</label><input className="inp" type="date" value={tglAkhir} onChange={e=>handleKeChange(e.target.value)}/></div>
    </div>}
    {periode==="custom"&&errCustom&&<div className="alert-banner yellow" style={{marginBottom:8}}><span>↔️</span><span>{errCustom}</span></div>}
    <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Data {fmtTgl(dari)} — {fmtTgl(ke)} · {jual.length} transaksi</div>

    {/* 4 Kartu */}
    <div className="grid2" style={{marginBottom:16}}>
      <div className="stat-card">
        <div className="stat-lbl">💰 Omzet</div>
        <div className="stat-val" style={{color:"var(--red)"}}>{fmtRb(omzet)}</div>
      </div>
      <div className="stat-card">
        <div className="stat-lbl">🍳 Biaya Produksi</div>
        <div className="stat-val" style={{color:"var(--orange)",fontSize:18}}>{fmtRb(biayaProd)}</div>
      </div>
      <div className="stat-card">
        <div className="stat-lbl">💸 Pengeluaran</div>
        <div className="stat-val" style={{color:"var(--muted)",fontSize:18}}>{fmtRb(biayaKeluar)}</div>
      </div>
      <div className="stat-card">
        <div className="stat-lbl">📈 Est. Laba Bersih</div>
        <div className="stat-val" style={{color:labaBersih>=0?"var(--green)":"#F87171"}}>{fmtRb(labaBersih)}</div>
      </div>
    </div>

    {/* Bar Chart */}
    <div className="card" style={{padding:"14px",marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:"var(--text2)"}}>📈 Tren Periode Dipilih ({chartRange.length} hari)</div>
      <div className="bar-chart">
        {chartRange.map((c,i)=><div key={i} className="bar-wrap">
          <div style={{display:"flex",alignItems:"flex-end",gap:2,height:84}}>
            <div className="bar" style={{flex:1,height:`${(c.omzD/maxVal)*84}px`,background:"var(--red)",opacity:.85,minHeight:c.omzD>0?4:0}}/>
            <div className="bar" style={{flex:1,height:`${(c.biayaD/maxVal)*84}px`,background:"var(--orange)",opacity:.7,minHeight:c.biayaD>0?4:0}}/>
          </div>
          <div className="bar-lbl">{c.label}</div>
        </div>)}
      </div>
      <div style={{display:"flex",gap:12,marginTop:8}}>
        <span style={{fontSize:11,color:"var(--muted)"}}><span style={{background:"var(--red)",borderRadius:2,padding:"1px 6px",marginRight:4}}>&nbsp;</span>Omzet</span>
        <span style={{fontSize:11,color:"var(--muted)"}}><span style={{background:"var(--orange)",borderRadius:2,padding:"1px 6px",marginRight:4}}>&nbsp;</span>Biaya</span>
      </div>
    </div>

    {/* Top Produk */}
    {topProd.length>0&&<div style={{marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"var(--text2)"}}>🏆 Produk Terlaris</div>
      {topProd.map((p,i)=><div key={p.nama} className="row-between" style={{padding:"8px 0",borderBottom:"1px solid var(--border2)"}}>
        <div className="row"><span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:16,color:"var(--muted2)",width:24}}>{i+1}</span>
          <span>{p.emoji}</span><span style={{fontWeight:700,fontSize:13}}>{p.nama}</span>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"var(--red)",fontWeight:700}}>{p.qty} pcs</div>
          <div style={{fontSize:12,color:"var(--muted)"}}>{fmt(p.nilai)}</div>
        </div>
      </div>)}
    </div>}

    {/* Analisis HPP */}
    <div style={{marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"var(--text2)"}}>📊 Analisis HPP vs Harga Jual</div>
      <div style={{position:"relative"}}>
        <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:380}}>
            <thead><tr style={{background:"var(--bg2)"}}>
              {["Produk","HPP","Ecer","Margin Ecer","Reseller","Margin RSL"].map(h=><th key={h} style={{padding:"8px 6px",textAlign:"left",color:"var(--muted)",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>)}
            </tr></thead>
            <tbody>{produkJadi.map(p=>{
              const me=p.hpp>0?Math.round((p.hargaEcer-p.hpp)/p.hargaEcer*100):null;
              const mr=p.hpp>0?Math.round((p.hargaReseller-p.hpp)/p.hargaReseller*100):null;
              return<tr key={p.id} style={{borderBottom:"1px solid var(--border2)"}}>
                <td style={{padding:"8px 6px",fontWeight:600,whiteSpace:"nowrap"}}>{p.emoji} {p.nama.split(" ").slice(0,2).join(" ")}</td>
                <td style={{color:"var(--orange)",fontWeight:700}}>{p.hpp>0?fmt(p.hpp):"—"}</td>
                <td style={{color:"var(--red)",fontWeight:700}}>{fmt(p.hargaEcer)}</td>
                <td><span style={{color:me!=null&&me<15?"var(--orange)":"var(--green)",fontWeight:700}}>{me!=null?me+"%":"—"}{me!=null&&me<15?" ⚠️":""}</span></td>
                <td style={{color:"var(--gold)",fontWeight:700}}>{fmt(p.hargaReseller)}</td>
                <td><span style={{color:mr!=null&&mr<10?"var(--orange)":"var(--green)",fontWeight:700}}>{mr!=null?mr+"%":"—"}</span></td>
              </tr>;
            })}</tbody>
          </table>
        </div>
        <div style={{position:"absolute",top:0,right:0,bottom:0,width:32,background:"linear-gradient(to right,transparent,rgba(255,248,245,.9))",pointerEvents:"none",borderRadius:"0 4px 4px 0"}}/>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:4,textAlign:"right"}}>← geser untuk lihat semua kolom</div>
      </div>
    </div>

    {/* Export */}
    <div style={{fontWeight:700,fontSize:14,marginBottom:10,color:"var(--text2)"}}>📥 Export Data</div>
    <div className="grid2">
      <button className="btn-out" onClick={()=>exportCSV("jual")}>📥 Export Penjualan CSV</button>
      <button className="btn-out" onClick={()=>exportCSV("prod")}>📥 Export Produksi CSV</button>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════
   HALAMAN 10 — SETELAN
══════════════════════════════════════════════════════ */
function Setelan({namaUsaha,setNamaUsaha,modalAwal,setModalAwal,showToast,setKonfirm,allData}){
  const[nama,setNama]=useState(namaUsaha);
  const[modal,setModal]=useState(modalAwal||"");
  const[faqOpen,setFaqOpen]=useState({});
  const[disclaimerTmpl,setDisclaimerTmpl]=useState(()=>{
    try{return localStorage.getItem('jd2_disclaimer')||"Simpan di kulkas maks. 5 hari atau freezer 1 bulan.\nPanaskan sebelum disajikan. Tidak mengandung pengawet.";}catch{return"";}
  });

  const simpanInfo=()=>{
    if(modal===""||+modal<0){showToast("Modal awal tidak boleh negatif atau kosong","error");return;}
    setNamaUsaha(nama||"JualanDapur");setModalAwal(+modal||0);showToast("Setelan disimpan ✅");
  };

  const backup=()=>{
    const d=JSON.stringify(allData,null,2);
    const a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(d);a.download=`jualan-dapur-backup-${todayStr}.json`;a.click();
    showToast("Backup diunduh ✅");
  };

  const restore=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.reseller)localStorage.setItem("jd2_reseller",JSON.stringify(d.reseller));
        if(d.bahanBaku)localStorage.setItem("jd2_bahan",JSON.stringify(d.bahanBaku));
        if(d.resep)localStorage.setItem("jd2_resep",JSON.stringify(d.resep));
        if(d.produkJadi)localStorage.setItem("jd2_produk",JSON.stringify(d.produkJadi));
        if(d.batchProduksi)localStorage.setItem("jd2_batch",JSON.stringify(d.batchProduksi));
        if(d.pembelianBahan)localStorage.setItem("jd2_beli_bahan",JSON.stringify(d.pembelianBahan));
        if(d.penjualan)localStorage.setItem("jd2_jual",JSON.stringify(d.penjualan));
        if(d.pengeluaran)localStorage.setItem("jd2_keluar",JSON.stringify(d.pengeluaran));
        showToast("Restore berhasil! Refresh untuk melihat data","info");
        setTimeout(()=>window.location.reload(),1500);
      }catch{showToast("File backup tidak valid","error");}
    };r.readAsText(f);
  };

  const resetData=()=>{
    backup();
    setKonfirm({judul:"Reset Semua Data?",pesan:"Backup otomatis diunduh. Semua data akan dihapus permanen. Lanjutkan?",labelYa:"Ya, Reset",warnaYa:"#F87171",
      onYa:()=>{
        ["jd2_reseller","jd2_bahan","jd2_resep","jd2_produk","jd2_batch","jd2_beli_bahan","jd2_jual","jd2_keluar","jd2_onboarded","jd2_modal_awal","jd2_nama_usaha","jd2_disclaimer"].forEach(k=>localStorage.removeItem(k));
        window.location.reload();
      }
    });
  };

  const FAQ=[
    {q:"Cara catat produksi pertama",a:"Buka menu 🍳 Catat Produksi, pilih resep, isi jumlah batch dan pcs jadi, lalu simpan. Stok bahan akan otomatis berkurang dan stok produk bertambah."},
    {q:"Kenapa HPP berubah setelah produksi baru?",a:"HPP dihitung rata-rata tertimbang dari stok lama dan batch baru. Ini memastikan HPP selalu mencerminkan biaya produksi terkini."},
    {q:"Cara kirim laporan ke WA",a:"Di halaman Kasir setelah transaksi selesai, tap tombol '📱 Kirim Struk via WA'. Struk terformat akan langsung terbuka di WhatsApp."},
    {q:"Cara install sebagai aplikasi di HP",a:"Di browser Chrome/Edge tap ikon menu (⋮), pilih 'Tambahkan ke Layar Utama' atau 'Install App'. Aplikasi akan muncul seperti app native."},
    {q:"Cara mengubah harga jual produk",a:"Buka menu 📦 Stok & Produk, tap kartu produk yang ingin diubah, lalu pilih ✏️ Edit. Ubah harga ecer atau harga reseller, lalu simpan. Harga baru berlaku di transaksi berikutnya."},
    {q:"Cara menambah reseller baru",a:"Buka menu 👥 Reseller, tap tombol '+ Tambah Reseller', isi nama, nomor WA, kota, tipe (Agen/Distributor), dan persentase diskon khusus. Setelah disimpan, nama reseller akan muncul di dropdown saat kasir."},
    {q:"Apa itu HPP dan kenapa penting?",a:"HPP (Harga Pokok Produksi) adalah biaya yang dikeluarkan untuk membuat satu unit produk, mencakup bahan baku, tenaga, dan biaya lainnya. HPP penting agar Anda tahu margin keuntungan sebenarnya. Jika harga jual terlalu dekat dengan HPP, usaha bisa merugi."},
    {q:"Cara membaca laporan laba bersih",a:"Di halaman 📊 Laporan, kartu 'Est. Laba Bersih' = Omzet dikurangi Biaya Produksi dan Pengeluaran operasional. Jika angkanya merah berarti periode tersebut merugi. Cek 'Margin Ecer' di tabel HPP — idealnya di atas 20%."},
    {q:"Kenapa saldo kas saya berkurang terus?",a:"Saldo Kas = Modal Awal + Omzet Penjualan − Pembelian Bahan Baku − Pengeluaran. Jika saldo turun padahal ada penjualan, pastikan Anda sudah catat semua pembelian bahan di menu 🧂 Bahan Baku dan tidak ada pengeluaran besar yang tercatat di menu 💸 Pengeluaran."},
    {q:"Cara backup dan restore data",a:"Buka ⚙️ Setelan → Backup & Restore. Tap '⬇️ Download Backup JSON' untuk simpan file backup ke HP. Jika ganti HP atau data hilang, tap '⬆️ Restore dari File JSON' dan pilih file backup yang sudah disimpan sebelumnya."},
  ];

  return<div className="page-pad">
    <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:22,marginBottom:16}}>⚙️ Setelan</div>

    {/* Info Usaha */}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>🏪 Info Usaha</div>
      <div className="frow"><label className="lbl">Nama Usaha</label>
        <input className="inp" value={nama} maxLength={60} onChange={e=>setNama(e.target.value)} placeholder="JualanDapur"/>
      </div>
      <div className="frow"><label className="lbl">Modal Awal Kas (Rp)</label>
        <input className="inp" type="number" min="0" value={modal} onChange={e=>setModal(e.target.value)} placeholder="3000000"/>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>Uang kas di tangan sebelum mulai berjualan</div>
      </div>
      <button className="btn-prime" onClick={simpanInfo}>💾 Simpan</button>
    </div>

    {/* Backup & Restore */}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{fontWeight:800,fontSize:14,marginBottom:12}}>💾 Backup & Restore</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <button className="btn-green" onClick={backup}>⬇️ Download Backup JSON</button>
        <label className="btn-gold" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,cursor:"pointer"}}>
          ⬆️ Restore dari File JSON
          <input type="file" accept=".json" onChange={restore} style={{display:"none"}}/>
        </label>
      </div>
    </div>

    {/* Template Disclaimer Nota */}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{fontWeight:800,fontSize:14,marginBottom:4}}>📌 Template Catatan / Disclaimer Nota</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>Teks ini akan otomatis muncul sebagai saran di field catatan saat kasir membuat nota.</div>
      <textarea className="inp" rows={4} value={disclaimerTmpl} onChange={e=>setDisclaimerTmpl(e.target.value)}
        placeholder="Cara penyimpanan, info halal, dll..."
        style={{resize:"vertical",fontSize:13,minHeight:90,marginBottom:10}}/>
      <button className="btn-prime" onClick={()=>{
        try{localStorage.setItem('jd2_disclaimer',disclaimerTmpl);}catch{}
        showToast("Template disclaimer disimpan ✅");
      }}>💾 Simpan Template</button>
    </div>

    {/* FAQ */}
    <div style={{fontWeight:800,fontSize:14,marginBottom:10}}>❓ Bantuan</div>
    {FAQ.map((f,i)=><div key={i} className="faq-item">
      <div className="faq-q" onClick={()=>setFaqOpen(o=>({...o,[i]:!o[i]}))}>
        <span>{f.q}</span><span style={{color:"var(--muted)"}}>{faqOpen[i]?"▲":"▼"}</span>
      </div>
      <div className={`faq-a${faqOpen[i]?" open":""}`}>{f.a}</div>
    </div>)}

    {/* Zona Berbahaya */}
    <div style={{marginTop:20,padding:16,background:"rgba(248,113,113,.06)",border:"1px solid rgba(248,113,113,.2)",borderRadius:12}}>
      <div style={{fontWeight:800,fontSize:14,color:"#B91C1C",marginBottom:8}}>🚨 Zona Berbahaya</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:12}}>Reset menghapus semua data secara permanen. Backup otomatis akan diunduh terlebih dahulu.</div>
      <button className="btn-red" onClick={resetData} style={{width:"100%"}}>🗑 Reset Semua Data</button>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════ */
function App(){
  const[page,setPage]=useState("dasbor");
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[konfirm,setKonfirm]=useState(null);
  const[showOnboarding,setShowOnboarding]=useState(()=>!localStorage.getItem('jd2_onboarded'));

  const[reseller,setReseller]=usePersist("jd2_reseller",SEED.reseller);
  const[bahanBaku,setBahanBaku]=usePersist("jd2_bahan",SEED.bahanBaku);
  const[resep,setResep]=usePersist("jd2_resep",SEED.resep);
  const[produkJadi,setProdukJadi]=usePersist("jd2_produk",SEED.produkJadi);
  const[batchProduksi,setBatchProduksi]=usePersist("jd2_batch",SEED.batchProduksi);
  const[pembelianBahan,setPembelianBahan]=usePersist("jd2_beli_bahan",SEED.pembelianBahan);
  const[penjualan,setPenjualan]=usePersist("jd2_jual",SEED.penjualan);
  const[pengeluaran,setPengeluaran]=usePersist("jd2_keluar",SEED.pengeluaran);
  const[modalAwal,setModalAwal]=usePersist("jd2_modal_awal",3000000);
  const[namaUsaha,setNamaUsaha]=usePersist("jd2_nama_usaha","JualanDapur");

  const showToast=useCallback((msg,type="success")=>{
    const id=uid();setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2800);
  },[]);

  const totalOmzet=penjualan.reduce((s,t)=>s+t.total,0);
  const totalBeliBahan=pembelianBahan.reduce((s,p)=>s+p.total,0);
  const totalKeluar=pengeluaran.reduce((s,p)=>s+p.jml,0);
  const saldo=(modalAwal||0)+totalOmzet-totalBeliBahan-totalKeluar;

  const goTo=id=>{setPage(id);setSidebarOpen(false);};

  useEffect(()=>{
    const el=document.getElementById('app-loading');
    if(el){el.style.transition='opacity .4s';el.style.opacity='0';setTimeout(()=>el.remove(),400);}
  },[]);

  const cp={produkJadi,setProdukJadi,bahanBaku,setBahanBaku,resep,setResep,batchProduksi,setBatchProduksi,pembelianBahan,setPembelianBahan,penjualan,setPenjualan,pengeluaran,setPengeluaran,reseller,setReseller,namaUsaha,setNamaUsaha,modalAwal,setModalAwal,showToast,setKonfirm,goTo};

  const allData={reseller,bahanBaku,resep,produkJadi,batchProduksi,pembelianBahan,penjualan,pengeluaran};

  const pages={
    dasbor:<Dasbor {...cp}/>,
    kasir:<Kasir {...cp}/>,
    produksi:<Produksi {...cp}/>,
    stok:<StokProduk {...cp}/>,
    bahan:<BahanBaku {...cp}/>,
    resep:<ResepPage {...cp}/>,
    reseller:<ResellerPage {...cp}/>,
    pengeluaran:<Pengeluaran {...cp}/>,
    laporan:<Laporan {...cp}/>,
    setelan:<Setelan {...cp} allData={allData}/>,
  };

  return<>
    {showOnboarding&&<Onboarding onDone={(targetPage)=>{setShowOnboarding(false);if(targetPage)goTo(targetPage);}} modalAwal={modalAwal} setModalAwal={setModalAwal} namaUsaha={namaUsaha} setNamaUsaha={setNamaUsaha}/>}
    <ToastContainer toasts={toasts}/>
    <KonfirmasiModal data={konfirm} onTutup={()=>setKonfirm(null)}/>

    {/* Mobile Topbar — fixed position */}
    <div className="topbar">
      <button onClick={()=>setSidebarOpen(o=>!o)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",minHeight:44,minWidth:44,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text)",flexShrink:0}}>☰</button>
      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:15,color:"var(--red)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🍱 {namaUsaha}</div>
      <div style={{flexShrink:0,fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,color:saldo<0?"var(--red)":"var(--green)"}}>{fmtRb(saldo)}</div>
    </div>

    <div id="app-root-inner">
      <div className={`overlay${sidebarOpen?" show":""}`} onClick={()=>setSidebarOpen(false)}/>
      <Sidebar page={page} goTo={goTo} saldo={saldo} open={sidebarOpen}/>
      <div className="main-scroll">{pages[page]||pages.dasbor}</div>
    </div>

    {page!=="produksi"&&<button className="fab" onClick={()=>goTo("produksi")} title="Catat Produksi">🍳</button>}
  </>;
}

ReactDOM.createRoot(document.getElementById("app-root")).render(<App/>);
</script>
<script>
// Register Service Worker untuk PWA + offline support
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(reg=>console.log('[SW] Registered, scope:',reg.scope))
      .catch(err=>console.warn('[SW] Registration failed:',err));
  });
}
</script>
</body>
</html>
